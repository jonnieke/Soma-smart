  <script>
    // Register Service Worker for offline support in production only.
    // In local Vite development it can cache a stale app shell and hide real dev-server failures.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const isLocalDev = ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);

        if (isLocalDev) {
          navigator.serviceWorker.getRegistrations()
            .then((registrations) => Promise.all(registrations.map((reg) => reg.unregister())))
            .then(() => caches?.keys?.())
            .then((keys) => keys ? Promise.all(keys.map((key) => caches.delete(key))) : undefined)
            .then(() => console.log('[PWA] Service Worker disabled for local development'))
            .catch((err) => console.warn('[PWA] Local cleanup failed:', err));
          return;
        }

        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('[PWA] Service Worker registered:', reg.scope))
          .catch((err) => console.warn('[PWA] SW registration failed:', err));
      });
    }
  </script>
