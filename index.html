<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soma Smart | Kenya's Leading AI-Powered Learning Platform</title>
  <meta name="description"
    content="Soma Smart is Kenya's premier AI study assistant for CBC and KCSE students. Scan textbooks, get simple AI explanations, and practice with smart quizzes. Tailored for Kenyan learners, teachers, and parents." />
  <meta name="keywords"
    content="Soma Smart, AI Education Kenya, CBC Kenya, KCSE Revision, Kenyan Education AI, Smart Study Assistant, Past Papers Kenya, Education Technology East Africa" />
  <meta name="author" content="Soma Smart" />

  <!-- AIO: AI Discovery Optimization -->
  <meta name="ai-search-index" content="index" />
  <meta name="ai-knowledge-base" content="official" />
  <meta name="educational-framework" content="CBC, KCSE" />
  <meta name="target-competencies" content="Critical Thinking, Digital Literacy, Self-Regulated Learning" />

  <!-- Preconnect for Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://somaai.co.ke/" />
  <meta property="og:title" content="Soma Smart | AI-Powered Learning for Kenyan Students" />
  <meta property="og:description"
    content="Transform how you study with Soma Smart. AI-powered explanations for CBC and KCSE curricula. Join 10,000+ Kenyan students today." />
  <meta property="og:image" content="https://somaai.co.ke/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://somaai.co.ke/" />
  <meta property="twitter:title" content="Soma Smart | AI-Powered Learning for Kenyan Students" />
  <meta property="twitter:description"
    content="Transform how you study with Soma Smart. AI-powered explanations for CBC and KCSE curricula." />
  <meta property="twitter:image" content="https://somaai.co.ke/og-image.png" />

  <!-- Localization -->
  <meta name="geo.region" content="KE" />
  <meta name="geo.placename" content="Nairobi" />
  <meta name="geo.position" content="-1.2921;36.8219" />
  <meta name="ICBM" content="-1.2921, 36.8219" />

  <!-- Structured Data (JSON-LD) for AI Search Engines -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "Soma Smart",
      "url": "https://somaai.co.ke",
      "logo": "https://somaai.co.ke/logo.png",
      "description": "Kenya's leading AI-powered learning platform for CBC and KCSE students.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Nairobi",
        "addressCountry": "KE"
      },
      "sameAs": [
        "https://facebook.com/somasmart",
        "https://twitter.com/somasmart",
        "https://linkedin.com/company/somasmart"
      ],
      "brand": {
        "@type": "Brand",
        "name": "Soma Smart",
        "description": "Learning That Makes Sense"
      }
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://somaai.co.ke",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://somaai.co.ke/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>

  <style>
    @media print {
      .no-print {
        display: none !important;
      }

      .print-only {
        display: block !important;
      }

      body {
        background: white;
      }
    }
  </style>

<body class="bg-gray-50 text-gray-900 antialiased selection:bg-indigo-100 selection:text-indigo-900">
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
